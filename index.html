<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peopole Bangla OCR - Document Verification</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>পিওপল ডকুমেন্ট ভেরিফিকেশন</header>
    <div id="upload-zone" class="dropzone">Drag PDF/Image or Click</div>
    <select id="lang-select">
      <option value="ben+eng">বাংলা+ইংরেজি</option>
      <option value="ben">শুধু বাংলা</option>
    </select>
    <div id="results"></div>
    <div id="status">Ready</div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
